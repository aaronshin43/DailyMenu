name: Keep Streamlit App Awake

on:
  schedule:
    # Runs every 8 hours just to be safe (since inactivity limit is 12h)
    - cron: '0 */8 * * *'
  workflow_dispatch:  # Allows manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit App
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          if [ -n "$STREAMLIT_APP_URL" ]; then
            echo "Pinging Streamlit app at $STREAMLIT_APP_URL..."
            curl -sSf "$STREAMLIT_APP_URL" > /dev/null || echo "Failed to ping Streamlit app"
          else
            echo "STREAMLIT_APP_URL secret is not set. Skipping ping."
          fi
